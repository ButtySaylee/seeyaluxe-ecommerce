<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#6b5b6e"/>
  <!-- Subtle inner glow border -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#d4a5a5" stroke-width="4" opacity="0.4"/>
  <!-- SL Monogram -->
  <text
    x="50%" y="54%"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="210"
    font-weight="700"
    fill="#d4a5a5"
    letter-spacing="-8"
  >SL</text>
  <!-- Tagline dots -->
  <circle cx="175" cy="390" r="5" fill="#d4a5a5" opacity="0.6"/>
  <circle cx="256" cy="390" r="5" fill="#d4a5a5" opacity="0.6"/>
  <circle cx="337" cy="390" r="5" fill="#d4a5a5" opacity="0.6"/>
</svg>
